Message=VRSOCCER
{
American="VR SOCCER '96 Demo Installation and Setup"
Canadian="VR SOCCER: Installation et configuration"
Deutsch="Installation und Setup von VR SOCCER"
}

Message=InstallIntroduction
{
American=
"Welcome to Install and Setup. This program will install the
VR SOCCER '96 Demo to your hard drive and setup your music
and sound devices."
Canadian=
"Bienvenue dans le programme d'installation et de configuration.
Ce programme va installer VR SOCCER sur votre disque dur et
configurer vos cartes musique et son, tout en vous laissant
choisir votre méthode de contrōle."
Deutsch=
"Willkommen beim Installations- und Setup-Programm. Dieses 
Programm installiert VR SOCCER auf Ihrer Festplatte und nimmt die 
Einstellungen für die Sound- und Musikkarte vor. Außerdem wird 
die Art der Steuerung bestimmt."
}

Message=SetupIntroduction
{
American=
"Welcome to Install and Setup. This program will setup your music
and sound devices for the VR SOCCER '96 Demo."
Canadian=
"Bienvenue dans le programme d'installation et de configuration.
Ce programme va configurer vos cartes musique et son pour 
VR SOCCER, tout en vous laissant choisir votre méthode 
de contrōle."
Deutsch=
"Willkommen beim Installations- und Setup-Programm. Dieses 
Programm nimmt die Einstellungen für die Sound- und 
Musikkarte vor. Außerdem wird die Art der Steuerung bestimmt."
}

