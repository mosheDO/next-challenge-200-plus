Message=MusicOnSoundCard
{
American=
"The device you have selected for sound effects can also be used
to play music."
Canadian=
"La carte que vous avez utilisée pour les effets sonores peut 
également łtre utilisée pour la musique."
Deutsch=
"Die von Ihnen gewählte Soundkarte kann auch zum Abspielen der 
Musik verwendet werden."
}

Message=DetectWarning
{
American=
"Install and Setup can automatically determine which sound device you
have attached to your system, sometimes this can cause a system to
hang, so the sound device can also be setup manually. If your system
does hang during detection, reset your machine and try again, any
device that did cause a hang will be ignored the next time."

Canadian=
"Le programme d'installation et de configuration peut déterminer 
automatiquement la carte sont qui équipe votre systŖme. Ceci peut 
parfois poser problŖme sur certains systŖmes et il convient, dans ce 
cas, de configurer la carte manuellement. Si votre systŖme se fige 
pendant la détection, réinitialisez votre ordinateur et essayez ģ 
nouveau. Toute carte qui cause problŖme sera ignorée la fois 
suivante."

Deutsch=
"Das Installations- und Setup-Programm kann automatisch 
bestimmen, welche Soundkarte Ihr Gerät benutzt, was jedoch 
manchmal zu Systemfehlern führt. Die Soundkarte kann deshalb 
auch manuell bestimmt werden. Sollten während der Bestimmung 
der Soundkarte Schwierigkeiten mit Ihrem System auftreten, dann 
starten Sie Ihr Gerät neu, und versuchen Sie es nochmals. Eine 
Karte, die einen Systemfehler verursacht, wird beim nächsten Mal 
nicht mehr berücksichtigt."
}

Message=SampleWarning
{
American=
"Install and Setup will now play a short sample to test the sound
device. It is possible that if the sound device is incorrectly
configured your system may hang."
Canadian=
"Les programmes d'installation et de configuration vont jouer un 
extrait musical afin de tester la carte musicale. Il est possible
que votre systŖme se fige si la carte musicale n'est pas
correctement configurée."
Deutsch=
"Das Installations- und Setup-Programm spielt nun eine kurze 
Melodie, um die Musikkarte zu testen. Sollte die Musikkarte 
fehlerhaft eingestellt sein, kann ein Systemfehler auftreten."
}

Message=TuneWarning
{
American=
"Install and Setup will now play a short tune to test the music
device. It is possible that if the music device is incorrectly
configured your system may hang."
Canadian=
"Les programmes Install et Setup vont maintenant vous faire 
écouter du piano pour tester la carte musicale. 
Si votre carte sonore n'est pas correctement configurée, il est 
possible que votre systŖme d'exploitation se bloque."
Deutsch=
"Das Installations- und Setup-Programm spielt nun eine 
Tonleiter, um die Musikkarte zu testen. 
Falls Ihre Soundkarte für die Musik falsch konfiguriert ist, 
kann Ihr System dabei blockieren."
}

Message=SoundHeard
{
American=
"If you did not hear anything you may wish to change the settings"
Canadian=
"Si vous n'avez rien entendu, vous pouvez changer la configuration."
Deutsch=
"Falls Sie nichts hören konnten, müssen Sie eventuell das 
Setup verändern."
}

Message=SoundComplete
{
American=
"Sound and Music Device Setup is now complete"
