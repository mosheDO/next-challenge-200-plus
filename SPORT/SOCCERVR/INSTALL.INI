Message=BootDiskStart
{
American=
"Install and Setup will now create a boot disk for VR SOCCER.
Insert a blank floppy disk in your boot drive."
Canadian=
"Install and Setup va créer une disquette de boot pour VR SOCCER. 
Insérez une disquette vierge dans votre lecteur de boot."
Deutsch=
"'Installation und Setup' erstellt eine Bootdiskette für VR SOCCER. 
Legen Sie dazu eine leere Diskette in Ihr Boot-Laufwerk."
}

Message=CreatingBootDisk
{
American="Creating VR SOCCER boot disk, please wait..."
Canadian="En train de créer disquette de boot pour VR SOCCER, attendez..."
Deutsch="VR SOCCER-Bootdiskette wird erstellt. Bitte warten..."
}

Message=BootDiskSuccess
{
American=
"Your VR SOCCER boot disk is now ready to use. If necessary add
your mouse and CD Drivers to the AUTOEXEC.BAT and CONFIG.SYS
on the disk."

Canadian=
"Votre disquette systŖme VR SOCCER est maintenant prłte pour
