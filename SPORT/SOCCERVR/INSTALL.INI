Title=VRSOCCER

OSVersion=5.00

CPUType=486
FPUType=Builtin

BaseMemory=0

ExtendedMemory=0

ExpandedMemory=0

ConfigurationFileName=CONFIG.INI

ReadMeFileName=READ.ME

DefaultPath=\VRSPORTS\SCCRDEMO

CDSpeedTest=DOS4GW.EXE

BootDiskConfig
{
FILES=20
BUFFERS=20,0
REM Remember to insert your CD driver and mouse driver if necessary
}

BootDiskAutoexec
{
@ECHO OFF
PROMPT $P$G
PATH=C:\DOS
C:
REM Remember to insert your CD driver and mouse driver if necessary
}

Installation
{
@Installing
md digi
copy %SourcePath%\*.*
copy %SourcePath%\digi\*.* digi

[Standard,Maximum;American]
md digi\pitch
copy %SourcePath%\digi\pitch\pitch.mad digi\pitch
}

